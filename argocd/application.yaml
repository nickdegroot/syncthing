apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: syncthing
  namespace: argocd

spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: syncthing

  sources:
    # 1. Helm chart
    - repoURL: http://brandan-schmitz.github.io/helm-charts
      targetRevision: 2.1.0
      chart: syncthing
      helm:
        valueFiles:
          - $values/helm/values.yaml

    # 2. Git repo (values reference)
    - repoURL: https://github.com/nickdegroot/syncthing.git
      targetRevision: main
      ref: values

    # 3. Extra Kubernetes manifests (NodePort etc.)
    - repoURL: https://github.com/nickdegroot/syncthing.git
      targetRevision: main
      path: k8s

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
