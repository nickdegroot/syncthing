apiVersion: v1
kind: Service
metadata:
  name: syncthing-nodeport
  namespace: syncthing
spec:
  type: NodePort
  selector:
    app.kubernetes.io/instance: syncthing
    app.kubernetes.io/name: syncthing
  ports:
    - name: sync
      port: 22000
      targetPort: 22000
      nodePort: 32200
      protocol: TCP
