ingress:
  main:
    enabled: true
    className: traefik

    hosts:
      - host: syncthing.lan
        paths:
          - path: /
            pathType: Prefix

    service:
      name: syncthing
      port: 8384   # UI ONLY

service:
  type: ClusterIP   # keep default; we expose sync separately via NodePort

persistence:
  config:
    enabled: true
    storageClass: local-path
    size: 10Gi
